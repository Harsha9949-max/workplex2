<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="WorkPlex - Elite Gig Economy Platform by HVRS Innovations" />
  <meta name="theme-color" content="#E8B84B" />

  <!-- ============================================================
       Performance - Resource Hints & Preloading
       ============================================================ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="modulepreload" href="/src/main.tsx" />

  <!-- PWA Meta Tags -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WorkPlex" />
  <link rel="manifest" href="/manifest.json" />

  <!-- SEO & Social -->
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="WorkPlex - HVRS Innovations" />
  <meta property="og:description" content="Elite Gig Economy Platform" />
  <meta property="og:type" content="website" />

  <title>WorkPlex - HVRS Innovations</title>

  <!-- ============================================================
       Critical CSS - Inline for Fast FCP
       ============================================================ -->
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background: #0A0A0A;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #fff;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Skip Link - Accessibility */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: #E8B84B;
      color: #000;
      padding: 0.5rem 1rem;
      z-index: 10000;
      font-weight: 600;
      text-decoration: none;
      transition: top 150ms ease;
    }

    .skip-link:focus {
      top: 0;
      outline: 2px solid #fff;
      outline-offset: 2px;
    }

    /* Splash Screen */
    #workplex-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0A0A0A 70%);
      z-index: 99999;
      will-change: opacity;
    }

    #workplex-splash.removing {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease-out;
    }

    .splash-logo-container {
      position: relative;
      width: 96px;
      height: 96px;
      margin-bottom: 2rem;
    }

    .splash-logo-glow {
      position: absolute;
      inset: -12px;
      background: radial-gradient(circle, rgba(232, 184, 75, 0.3) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulseGlow 2s ease-in-out infinite;
    }

    .splash-logo {
      position: relative;
      width: 96px;
      height: 96px;
    }

    .splash-title {
      font-size: clamp(1.75rem, 1.5rem + 1.25vw, 2.25rem);
      font-weight: 900;
      background: linear-gradient(135deg, #E8B84B 0%, #F5D78E 50%, #E8B84B 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .splash-subtitle {
      font-size: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      color: #6B7280;
      font-weight: 400;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    .splash-loader {
      width: 120px;
      height: 3px;
      background: rgba(232, 184, 75, 0.1);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .splash-loader-bar {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, transparent, #E8B84B, transparent);
      border-radius: 999px;
      animation: loadingSlide 1s ease-in-out infinite;
    }

    @keyframes pulseGlow {

      0%,
      100% {
        opacity: 0.5;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.1);
      }
    }

    @keyframes loadingSlide {
      0% {
        left: -40%;
      }

      100% {
        left: 100%;
      }
    }

    /* No JS fallback */
    .no-js-message {
      display: none;
      color: #9CA3AF;
      margin-top: 1rem;
      font-size: 0.875rem;
    }
  </style>

  <!-- Hide splash if JS is disabled -->
  <noscript>
    <style>
      #workplex-splash {
        display: none !important;
      }

      .no-js-message {
        display: block !important;
        text-align: center;
        padding: 2rem;
        color: #EF4444;
      }
    </style>
  </noscript>
</head>

<body>
  <!-- Accessibility Skip Link -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Root element with embedded splash screen -->
  <div id="root">
    <!-- ============================================================
         High-End SVG Splash Screen
         Removed by main.tsx AFTER React successfully renders
         ============================================================ -->
    <div id="workplex-splash" role="status" aria-label="Loading WorkPlex application">
      <div class="splash-logo-container">
        <div class="splash-logo-glow"></div>
        <svg class="splash-logo" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img"
          aria-label="WorkPlex Logo">
          <title>WorkPlex Logo</title>
          <path d="M48 4L84 18V46C84 68 68 86 48 92C28 86 12 68 12 46V18L48 4Z" fill="url(#shieldGradient)"
            stroke="#E8B84B" stroke-width="2" />
          <path d="M48 12L76 24V46C76 64 62 78 48 84C34 78 20 64 20 46V24L48 12Z" fill="url(#innerGradient)"
            opacity="0.6" />
          <path d="M32 36L40 52L48 36L56 52L64 36" stroke="#000000" stroke-width="4" stroke-linecap="round"
            stroke-linejoin="round" />
          <circle cx="48" cy="68" r="4" fill="#E8B84B" />
          <defs>
            <linearGradient id="shieldGradient" x1="12" y1="4" x2="84" y2="92">
              <stop offset="0%" stop-color="#F5D78E" />
              <stop offset="50%" stop-color="#E8B84B" />
              <stop offset="100%" stop-color="#D4A03C" />
            </linearGradient>
            <linearGradient id="innerGradient" x1="20" y1="12" x2="76" y2="84">
              <stop offset="0%" stop-color="#FFF7E6" />
              <stop offset="100%" stop-color="#E8B84B" />
            </linearGradient>
          </defs>
        </svg>
      </div>

      <h1 class="splash-title">WorkPlex</h1>
      <p class="splash-subtitle">HVRS Innovations</p>

      <div class="splash-loader">
        <div class="splash-loader-bar"></div>
      </div>

      <noscript>
        <p class="no-js-message">JavaScript is required to run WorkPlex. Please enable JavaScript and refresh the page.
        </p>
      </noscript>
    </div>
  </div>

  <!-- ============================================================
       Main Application Entry Point
       ============================================================ -->
  <script type="module" src="/src/main.tsx"></script>

  <!-- ============================================================
       Asset Load Detector - Safe Mode Fallback
       Checks if the Vite module system loaded within 5 seconds.
       If NOT, replaces #root with a Connection Error UI instead
       of leaving a black/blank screen.
       ============================================================ -->
  <script>
    (function () {
      var BOOT_TIMEOUT = 15000; // 15 seconds (first load after cache clear needs more time)
      var bootTimedOut = false;
      var bootComplete = false;

      // Mark boot complete when main.tsx executes
      window.__WORKPLEX_BOOT_COMPLETE = false;

      function showConnectionError(errorType) {
        if (bootComplete) return; // React already took over
        if (bootTimedOut) return; // Already shown
        bootTimedOut = true;

        console.error('[WorkPlex] Boot failure detected:', errorType);

        var root = document.getElementById('root');
        if (!root) return;

        // Hide splash
        var splash = document.getElementById('workplex-splash');
        if (splash) {
          splash.style.opacity = '0';
          splash.style.transition = 'opacity 0.3s ease-out';
          setTimeout(function () {
            if (splash.parentNode) splash.parentNode.removeChild(splash);
          }, 350);
        }

        // Show Safe Mode UI
        root.innerHTML =
          '<div style="min-height:100vh;background:#0A0A0A;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;font-family:system-ui,-apple-system,sans-serif;color:#fff;text-align:center;">' +
          '<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:1.5rem;">' +
          '<path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>' +
          '<line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>' +
          '</svg>' +
          '<h1 style="font-size:1.5rem;font-weight:700;margin-bottom:0.5rem;">Connection Error</h1>' +
          '<p style="color:#9CA3AF;margin-bottom:0.25rem;max-width:28rem;">The development server is unreachable or modules failed to load.</p>' +
          '<p style="color:#6B7280;font-size:0.75rem;margin-bottom:1.5rem;font-family:monospace;">' + errorType + '</p>' +
          '<div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;">' +
          '<button onclick="window.location.reload()" style="background:#E8B84B;color:#000;font-weight:600;padding:0.75rem 1.5rem;border-radius:0.5rem;border:none;cursor:pointer;font-size:0.875rem;">Refresh Page</button>' +
          '<button id="wp-troubleshoot-btn" style="background:transparent;color:#9CA3AF;font-weight:600;padding:0.75rem 1.5rem;border-radius:0.5rem;border:1px solid #374151;cursor:pointer;font-size:0.875rem;">Troubleshoot</button>' +
          '</div>' +
          '<div id="wp-troubleshoot-info" style="display:none;margin-top:1.5rem;text-align:left;background:#111827;padding:1rem;border-radius:0.5rem;font-size:0.75rem;color:#9CA3AF;max-width:32rem;">' +
          '<p style="margin-bottom:0.5rem;"><strong style="color:#E8B84B;">Quick checks:</strong></p>' +
          '<ul style="list-style:disc;padding-left:1.25rem;line-height:1.8;">' +
          '<li>Is the dev server running? Run: <code style="color:#F59E0B;">npm run dev</code></li>' +
          '<li>Check the port matches (default: <code style="color:#F59E0B;">localhost:2532</code>)</li>' +
          '<li>Open DevTools (F12) > Network tab > look for RED entries</li>' +
          '<li>Try a deep clean: <code style="color:#F59E0B;">npm run deep-clean</code></li>' +
          '</ul>' +
          '</div>' +
          '</div>';

        // Attach troubleshoot handler
        setTimeout(function () {
          var btn = document.getElementById('wp-troubleshoot-btn');
          var info = document.getElementById('wp-troubleshoot-info');
          if (btn && info) {
            btn.addEventListener('click', function () {
              info.style.display = info.style.display === 'none' ? 'block' : 'none';
            });
          }
        }, 100);
      }

      // Boot timeout timer
      var timer = setTimeout(function () {
        if (!window.__WORKPLEX_BOOT_COMPLETE) {
          showConnectionError('BOOT_TIMEOUT: Modules did not load within ' + (BOOT_TIMEOUT / 1000) + 's');
        }
      }, BOOT_TIMEOUT);

      // Also listen for Vite HMR errors via the dev server
      window.addEventListener('error', function (e) {
        if (e.message && (
          e.message.includes('Failed to fetch') ||
          e.message.includes('Failed to resolve') ||
          e.message.includes('Failed to load module') ||
          e.message.includes('NetworkError') ||
          (e.target && e.target.tagName === 'SCRIPT' && e.target.src)
        )) {
          clearTimeout(timer);
          showConnectionError('MODULE_LOAD_ERROR: ' + (e.message || 'Script failed to load'));
        }
      }, true);

      // Mark boot complete flag (main.tsx will set window.__WORKPLEX_BOOT_COMPLETE = true)
      Object.defineProperty(window, '__WORKPLEX_BOOT_COMPLETE', {
        set: function (val) {
          if (val === true) {
            bootComplete = true;
            clearTimeout(timer);
          }
        },
        get: function () {
          return bootComplete;
        },
        configurable: true
      });
    })();
  </script>

  <!-- ============================================================
       Service Worker Registration - REMOVED
       Moved to main.tsx for centralized, idempotent registration.
       Having it in both places caused race conditions and infinite
       reload loops. See main.tsx > "Service Worker Registration"
       ============================================================ -->
</body>

</html>
