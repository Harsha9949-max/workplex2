<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="WorkPlex - Elite Gig Economy Platform by HVRS Innovations" />
  <meta name="theme-color" content="#E8B84B" />

  <!-- ============================================================
       Performance - Resource Hints & Preloading
       ============================================================ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="modulepreload" href="/src/main.tsx" />

  <!-- PWA Meta Tags -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WorkPlex" />
  <link rel="manifest" href="/manifest.json" />

  <!-- SEO & Social -->
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="WorkPlex - HVRS Innovations" />
  <meta property="og:description" content="Elite Gig Economy Platform" />
  <meta property="og:type" content="website" />

  <title>WorkPlex - HVRS Innovations</title>

  <!-- ============================================================
       Critical CSS - Inline for Fast FCP
       ============================================================ -->
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background: #0A0A0A;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #fff;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Skip Link - Accessibility */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: #E8B84B;
      color: #000;
      padding: 0.5rem 1rem;
      z-index: 10000;
      font-weight: 600;
      text-decoration: none;
      transition: top 150ms ease;
    }

    .skip-link:focus {
      top: 0;
      outline: 2px solid #fff;
      outline-offset: 2px;
    }

    /* Splash Screen */
    #workplex-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0A0A0A 70%);
      z-index: 99999;
      will-change: opacity;
    }

    #workplex-splash.removing {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease-out;
    }

    .splash-logo-container {
      position: relative;
      width: 96px;
      height: 96px;
      margin-bottom: 2rem;
    }

    .splash-logo-glow {
      position: absolute;
      inset: -12px;
      background: radial-gradient(circle, rgba(232, 184, 75, 0.3) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulseGlow 2s ease-in-out infinite;
    }

    .splash-logo {
      position: relative;
      width: 96px;
      height: 96px;
    }

    .splash-title {
      font-size: clamp(1.75rem, 1.5rem + 1.25vw, 2.25rem);
      font-weight: 900;
      background: linear-gradient(135deg, #E8B84B 0%, #F5D78E 50%, #E8B84B 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .splash-subtitle {
      font-size: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      color: #6B7280;
      font-weight: 400;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    .splash-loader {
      width: 120px;
      height: 3px;
      background: rgba(232, 184, 75, 0.1);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .splash-loader-bar {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, transparent, #E8B84B, transparent);
      border-radius: 999px;
      animation: loadingSlide 1s ease-in-out infinite;
    }

    @keyframes pulseGlow {

      0%,
      100% {
        opacity: 0.5;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.1);
      }
    }

    @keyframes loadingSlide {
      0% {
        left: -40%;
      }

      100% {
        left: 100%;
      }
    }

    /* No JS fallback */
    .no-js-message {
      display: none;
      color: #9CA3AF;
      margin-top: 1rem;
      font-size: 0.875rem;
    }
  </style>

  <!-- Hide splash if JS is disabled -->
  <noscript>
    <style>
      #workplex-splash {
        display: none !important;
      }

      .no-js-message {
        display: block !important;
        text-align: center;
        padding: 2rem;
        color: #EF4444;
      }
    </style>
  </noscript>
</head>

<body>
  <!-- Accessibility Skip Link -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Root element with embedded splash screen -->
  <div id="root">
    <!-- ============================================================
         High-End SVG Splash Screen
         Removed by main.tsx AFTER React successfully renders
         ============================================================ -->
    <div id="workplex-splash" role="status" aria-label="Loading WorkPlex application">
      <div class="splash-logo-container">
        <div class="splash-logo-glow"></div>
        <svg class="splash-logo" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img"
          aria-label="WorkPlex Logo">
          <title>WorkPlex Logo</title>
          <path d="M48 4L84 18V46C84 68 68 86 48 92C28 86 12 68 12 46V18L48 4Z" fill="url(#shieldGradient)"
            stroke="#E8B84B" stroke-width="2" />
          <path d="M48 12L76 24V46C76 64 62 78 48 84C34 78 20 64 20 46V24L48 12Z" fill="url(#innerGradient)"
            opacity="0.6" />
          <path d="M32 36L40 52L48 36L56 52L64 36" stroke="#000000" stroke-width="4" stroke-linecap="round"
            stroke-linejoin="round" />
          <circle cx="48" cy="68" r="4" fill="#E8B84B" />
          <defs>
            <linearGradient id="shieldGradient" x1="12" y1="4" x2="84" y2="92">
              <stop offset="0%" stop-color="#F5D78E" />
              <stop offset="50%" stop-color="#E8B84B" />
              <stop offset="100%" stop-color="#D4A03C" />
            </linearGradient>
            <linearGradient id="innerGradient" x1="20" y1="12" x2="76" y2="84">
              <stop offset="0%" stop-color="#FFF7E6" />
              <stop offset="100%" stop-color="#E8B84B" />
            </linearGradient>
          </defs>
        </svg>
      </div>

      <h1 class="splash-title">WorkPlex</h1>
      <p class="splash-subtitle">HVRS Innovations</p>

      <div class="splash-loader">
        <div class="splash-loader-bar"></div>
      </div>

      <noscript>
        <p class="no-js-message">JavaScript is required to run WorkPlex. Please enable JavaScript and refresh the page.
        </p>
      </noscript>
    </div>
  </div>

  <!-- ============================================================
       Main Application Entry Point
       ============================================================ -->
  <script type="module" src="/src/main.tsx"></script>

  <!-- ============================================================
       Inline Service Worker Registration - Idempotent
       Only registers SW, NO reload logic (handled in main.tsx)
       ============================================================ -->
  <script>
    // Minimal SW registration - main.tsx handles updates safely
    if ('serviceWorker' in navigator && !window.__SW_REGISTERED) {
      window.__SW_REGISTERED = true;
      window.addEventListener('load', function () {
        setTimeout(function () {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function (reg) { console.log('[SW] Registered'); })
            .catch(function (err) { console.warn('[SW] Registration failed (non-critical):', err); });
        }, 2000);
      });
    }
  </script>
</body>

</html>
