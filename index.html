<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WorkPlex - HVRS Innovations</title>
  <meta name="description" content="WorkPlex - Elite Gig Economy Platform by HVRS Innovations" />

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#E8B84B" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WorkPlex" />
  <link rel="manifest" href="/manifest.json" />

  <!-- CSS-Only Splash Screen / Loader -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0A0A0A;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    #splash-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0A0A0A 0%, #111111 50%, #0A0A0A 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
    }

    #splash-screen.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #E8B84B 0%, #F5C95C 100%);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      box-shadow: 0 0 40px rgba(232, 184, 75, 0.3);
      animation: pulse-glow 2s ease-in-out infinite;
    }

    .splash-logo svg {
      width: 48px;
      height: 48px;
    }

    .splash-title {
      color: #ffffff;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .splash-subtitle {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 48px;
    }

    .splash-loader {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(232, 184, 75, 0.1);
      border-top-color: #E8B84B;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse-glow {

      0%,
      100% {
        box-shadow: 0 0 30px rgba(232, 184, 75, 0.3);
      }

      50% {
        box-shadow: 0 0 50px rgba(232, 184, 75, 0.6);
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <!-- CSS-Only Splash Screen -->
    <div id="splash-screen">
      <div class="splash-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
      </div>
      <div class="splash-title">WorkPlex</div>
      <div class="splash-subtitle">HVRS Innovations</div>
      <div class="splash-loader"></div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- PWA Service Worker Registration -->
  <script>
    // Register Service Worker with cache-busting
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const registration = await navigator.serviceWorker.register('/sw.js', {
            scope: '/'
          });
          console.log('SW registered:', registration.scope);

          // Check for updates
          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            if (newWorker) {
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New version available
                  console.log('New version available, refreshing...');
                  window.location.reload();
                }
              });
            }
          });
        } catch (error) {
          console.error('SW registration failed:', error);
        }
      });
    }

    // Hide splash screen after app loads
    window.addEventListener('load', () => {
      const splash = document.getElementById('splash-screen');
      if (splash) {
        // Wait a bit for React to hydrate
        setTimeout(() => {
          splash.classList.add('fade-out');
          // Remove from DOM after transition
          setTimeout(() => splash.remove(), 500);
        }, 300);
      }
    });
  </script>
</body>

</html>
